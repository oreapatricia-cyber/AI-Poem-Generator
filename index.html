<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="style.css" />
    <title>AI Poem Generator</title>
  </head>

  <body>
    <div class="container">
      <h1>Welcome to the AI Poem Generator</h1>

      <main>
        <form id="poem-generator-form">
          <label for="theme">Enter a theme for your poem:</label>
          <input type="text" id="theme" name="theme" required />
          <button type="submit">Submit</button>
        </form>

        <!-- Empty poem container (hidden until filled) -->
        <div class="poem" id="poem"></div>
      </main>

      <footer>
        This AI project was coded by
        <a href="https://github.com/oreapatricia-cyber" target="_blank">
          Patricia J. Orea
        </a>
        and is
        <a
          href="https://github.com/oreapatricia-cyber/AI-Poem-Generator"
          target="_blank"
        >
          open-sourced on GitHub
        </a>
        and is
        <a href="https://griffinorea.netlify.app/" target="_blank">
          hosted on Netlify
        </a>
      </footer>
    </div>
    <script src="index.js"></script>
  </body>
</html>
