<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>AI Poem Generator</title>
  </head>

  <body>
    <div class="container">
      <h1>Welcome to the AI Poem Generator</h1>

      <main>
        <form id="poem-form">
          <label for="theme">Enter a theme for your poem:</label>
          <input type="text" id="theme" name="theme" required />
          <button type="submit">Submit</button>
        </form>

        <div id="poem-container"></div>
        <div class="poem">
          Cuántas veces, amor, te amé sin verte y tal vez sin recuerdo,
<br/>
y sin embargo, amor, te amé con todo el corazón, con toda el alma, con toda la vida.
</div>
        </div>
      </main>

      <footer>
        This AI project was coded by
        <a href="https://github.com/oreapatricia-cyber" target="_blank">
          Patricia J. Orea
        </a>
        and is
        <a
          href="https://github.com/oreapatricia-cyber/AI-Poem-Generator"
          target="_blank"
        >
          open-sourced on GitHub
        </a>
        and is
        <a href="https://griffinorea.netlify.app/" target="_blank">
          hosted on Netlify
        </a>
      </footer>
    </div>

    <script src="index.js"></script>
  </body>
</html>
